version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: soulpulse-db
    environment:
      POSTGRES_USER: soulpulse
      POSTGRES_PASSWORD: soulpulse123
      POSTGRES_DB: soulpulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
