name: soulpulse
description: "SoulPulse - AI Companion Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  shared_preferences: ^2.3.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  timeago: ^3.7.0
  google_fonts: ^6.2.0
  video_player: ^2.9.2
  web_socket_channel: ^3.0.1
  intl: ^0.19.0
  flutter_local_notifications: ^19.5.0
  # Firebase Cloud Messaging - UNCOMMENT after Firebase setup
  # firebase_core: ^3.0.0
  # firebase_messaging: ^15.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#1E1B2E"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
